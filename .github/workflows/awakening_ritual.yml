name: AETHERIUM Awakening Ritual (App Auth)

on:
  workflow_dispatch:
jobs:
  awaken_agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Generate GEP Auditor Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AETHERIUM_APP_ID }}
          private-key: ${{ secrets.AETHERIUM_APP_PRIVATE_KEY }}

      - name: Awakening Cognitive Agent (Alpha)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          AETHERIUM_AGENT_KEY: ${{ secrets.AETHERIUM_AGENT_KEY }}
          AETHERIUM_API_URL: ${{ vars.AETHERIUM_API_URL }}
        run: |
          echo "--- 🌌 SYSTEM LOG: INITIATING MIND-BODY CONNECTION ---"
          python aether_integration.py
          echo "GH_TOKEN is ready."
