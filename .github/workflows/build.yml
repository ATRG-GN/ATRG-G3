name: สร้างและทดสอบ Aetherium Genesis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ ตรวจสอบโค้ดเบส
        uses: actions/checkout@v6

      - name: 🐍 ตั้งค่า Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 ติดตั้งส่วนประกอบที่จำเป็น
        run: pip install -r requirements.txt

      - name: 🧪 รัน Unit Tests (GEP Audit Check)
        run: |
          PYTHONPATH=. pytest --cov=.

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
